# .github/workflows/cd.yml
name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [main]
    types: [completed]

env:
  REGISTRY: registry.atsawa.dev
  IMAGE_NAME: emailservice

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU (for ARM64 builds)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to local registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push (ARM64 for Raspberry Pi)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup WireGuard
        run: |
          sudo apt install wireguard -y
          echo "${{ secrets.WG_PRIVATE_KEY }}" > /tmp/private.key
          chmod 600 /tmp/private.key
          sudo ip link add wg0 type wireguard
          sudo ip addr add 10.8.0.6/24 dev wg0
          sudo wg set wg0 \
            private-key /tmp/private.key \
            peer ${{ secrets.WG_SERVER_PUBLIC_KEY }} \
            endpoint ${{ secrets.WG_SERVER_ENDPOINT }} \
            allowed-ips 10.8.0.0/24 \
            persistent-keepalive 25
          sudo ip link set wg0 up
          sleep 3
          ping -c 3 ${{ secrets.PI_HOST }}

      - name: Deploy via SSH to Raspberry Pi
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            echo ${{ secrets.REGISTRY_PASSWORD }} | docker login registry.atsawa.dev \
              -u ${{ secrets.REGISTRY_USER }} --password-stdin
            docker pull registry.atsawa.dev/emailservice:latest
            docker stop emailservice || true
            docker rm emailservice || true
            docker run -d \
              --name emailservice \
              --restart=always \
              -p 3000:3000 \
              registry.atsawa.dev/emailservice:latest
